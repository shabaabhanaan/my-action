name: JS Action Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-js-action:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Run JS Action
        uses: ./               # Runs your action from the root folder
        with:
          name: "Hanaan"